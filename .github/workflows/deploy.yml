name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'langton-arena-web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Только один деплой одновременно; следующий отменяет предыдущий.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: langton-arena-web/package-lock.json

      - name: Install dependencies
        working-directory: langton-arena-web
        run: npm ci

      - name: Run tests
        working-directory: langton-arena-web
        run: npm run test

      - name: Build
        working-directory: langton-arena-web
        env:
          GITHUB_ACTIONS: 'true'
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: langton-arena-web/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
