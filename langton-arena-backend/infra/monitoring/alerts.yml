# infra/monitoring/alerts.yml
# Prometheus alerting rules.

groups:
  - name: arena-critical
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_request_duration_seconds_count{status=~"5.."}[5m]))
          / sum(rate(http_request_duration_seconds_count[5m])) > 0.01
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "Error rate > 1% on {{ $labels.service }}"

      - alert: GameWorkerSlowTick
        expr: histogram_quantile(0.99, rate(game_tick_duration_ms_bucket[5m])) > 100
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Game worker tick p99 > 100ms"

      - alert: MatchmakingQueueStuck
        expr: arena_queue_size > 100
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Matchmaking queue size > 100 for 5 minutes"

      - alert: DatabaseConnectionsLow
        expr: pg_pool_idle_count < 2
        for: 3m
        labels: { severity: warning }
        annotations:
          summary: "Postgres pool nearly exhausted"
