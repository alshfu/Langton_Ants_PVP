# infra/k8s/api-gateway.yaml
# Deployment + Service для API Gateway.

apiVersion: apps/v1
kind: Deployment
metadata: { name: api-gateway, labels: { app: api-gateway } }
spec:
  replicas: 2
  selector: { matchLabels: { app: api-gateway } }
  template:
    metadata: { labels: { app: api-gateway } }
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/langton/api-gateway:latest
          ports: [{ containerPort: 3000 }]
          envFrom: [{ secretRef: { name: arena-secrets } }, { configMapRef: { name: arena-config } }]
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 512Mi }
          livenessProbe:  { httpGet: { path: /health, port: 3000 }, initialDelaySeconds: 10 }
          readinessProbe: { httpGet: { path: /ready,  port: 3000 } }
---
apiVersion: v1
kind: Service
metadata: { name: api-gateway }
spec:
  type: ClusterIP
  selector: { app: api-gateway }
  ports: [{ port: 80, targetPort: 3000 }]
