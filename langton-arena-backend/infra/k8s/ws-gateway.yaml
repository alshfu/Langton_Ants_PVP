# infra/k8s/ws-gateway.yaml
# WS Gateway: sticky sessions через session affinity.

apiVersion: apps/v1
kind: Deployment
metadata: { name: ws-gateway }
spec:
  replicas: 2
  selector: { matchLabels: { app: ws-gateway } }
  template:
    metadata: { labels: { app: ws-gateway } }
    spec:
      containers:
        - name: ws-gateway
          image: ghcr.io/langton/ws-gateway:latest
          ports: [{ containerPort: 3001 }]
          envFrom: [{ secretRef: { name: arena-secrets } }, { configMapRef: { name: arena-config } }]
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata: { name: ws-gateway }
spec:
  type: ClusterIP
  sessionAffinity: ClientIP        # Sticky по client IP
  sessionAffinityConfig: { clientIP: { timeoutSeconds: 3600 } }
  selector: { app: ws-gateway }
  ports: [{ port: 80, targetPort: 3001 }]
