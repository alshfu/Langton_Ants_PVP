# infra/redis/redis.conf
# Минимальный конфиг для нашего use-case.

# Сеть
bind 0.0.0.0
port 6379
protected-mode no

# Память
maxmemory 512mb
maxmemory-policy allkeys-lru   # выселяем редко-используемые ключи

# Persistence:
# Мы храним state матчей и rate-limit счётчики — потеря на рестарте приемлема.
# Но refresh tokens — нет. Поэтому AOF включён, но fsync everysec (компромисс).
appendonly yes
appendfsync everysec
save ""                          # RDB snapshots отключаем, AOF достаточно

# Безопасность
# requirepass <set via env REDIS_PASSWORD in production>

# Логирование
loglevel notice
