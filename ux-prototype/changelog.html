<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Langton Arena · Changelog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; background: #0E0B1F; color: #F5F5F7; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; overflow: hidden; }
    #stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #frame {
      width: 1280px; height: 800px;
      transform-origin: center;
      box-shadow: 0 24px 80px rgba(0,0,0,.4);
      border-radius: 14px; overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
    }
    button { font-family: inherit; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="stage"><div id="frame"><div id="root"></div></div></div>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#0E0B1F"/>
      <rect x="20" y="20" width="22" height="22" rx="3" fill="#F5F5F7" opacity=".22"/>
      <rect x="46" y="20" width="22" height="22" rx="3" fill="#F5F5F7" opacity=".42"/>
      <rect x="20" y="46" width="22" height="22" rx="3" fill="#F5F5F7" opacity=".62"/>
      <rect x="46" y="46" width="22" height="22" rx="3" fill="#FFD60A"/>
    </svg>
  </template>

  <script src="audio.js"></script>
  <script type="text/babel" src="state.jsx"></script>
  <script type="text/babel" src="themes.jsx"></script>
  <script type="text/babel" src="i18n.jsx"></script>
  <script type="text/babel" src="langton.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="charts.jsx"></script>
  <script type="text/babel" src="system-overlays.jsx"></script>
  <script type="text/babel" src="screens-menu.jsx"></script>
  <script type="text/babel" src="screens-match.jsx"></script>
  <script type="text/babel" src="screens-result.jsx"></script>
  <script type="text/babel" src="screens-stats.jsx"></script>
  <script type="text/babel" src="screens-settings.jsx"></script>
  <script type="text/babel" src="screens-sandbox.jsx"></script>
  <script type="text/babel" src="screens-credits.jsx"></script>
  <script type="text/babel" src="screens-changelog.jsx"></script>

  <script type="text/babel">
    function fit() {
      const frame = document.getElementById('frame');
      if (!frame) return;
      const sx = window.innerWidth  / 1280;
      const sy = window.innerHeight / 800;
      const s = Math.min(1, sx, sy) * 0.95;
      frame.style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fit);

    function App() {
      const [data, setData] = React.useState(defaultState());
      const actions = React.useMemo(() => {
        const a = defaultActions();
        a.onReturnToMenu = () => { window.location.href = 'launcher.html'; };
        return a;
      }, []);
      React.useEffect(fit, []);
      return React.createElement(
        ThemeProvider, { initial: 'dark' },
        React.createElement(
          I18nProvider, { locale: data?.settings?.account?.locale || data?.locale?.current || 'en' },
          React.createElement(ChangelogDesktop, { width: 1280, height: 800, data, actions })
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
